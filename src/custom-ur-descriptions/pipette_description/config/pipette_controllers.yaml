controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    plunger_controller:
      type: position_controllers/JointTrajectoryController

    tip_eject_controller:
      type: position_controllers/JointTrajectoryController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

plunger_controller:
  ros__parameters:
    joints:
      - plunger_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0
      plunger_joint:
        trajectory: 0.001
        goal: 0.001

tip_eject_controller:
  ros__parameters:
    joints:
      - tip_eject_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.01
      goal_time: 0.0
      tip_eject_joint:
        trajectory: 0.001
        goal: 0.001

joint_state_broadcaster:
  ros__parameters:
    joints:
      - plunger_joint
      - tip_eject_joint